<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>首页 - 古着商城</title>
    <link rel="stylesheet" href="../../uno.css?v=__ASSET_VERSION__">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Open+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Source+Code+Pro:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css?v=__ASSET_VERSION__">
    <script src="../../scrollbar-control.js?v=__ASSET_VERSION__"></script></head>
<body class="vintage-bg" style="margin:0;padding:0;">
    <!-- 顶部导航 -->
    <header class="bg-white sticky top-0 z-50 safe-top border-b border-[#E7E5E4]">
        <div class="flex items-center justify-between px-4 py-4">
            <h1 class="text-lg font-medium gradient-text tracking-wider">VINTAGE</h1>
            <div class="flex items-center gap-5">
                <i class="fas fa-search text-[#1C1917] text-lg"></i>
                <i class="fas fa-shopping-bag text-[#1C1917] text-lg relative">
                    <span class="absolute -top-2 -right-2 vintage-badge w-4 h-4 flex items-center justify-center text-[8px]">2</span>
                </i>
            </div>
        </div>
    </header>
    
    <!-- 搜索栏 -->
    <section class="px-4 py-3 bg-white border-b border-[#E7E5E4]">
        <div class="vintage-input w-full flex items-center">
            <i class="fas fa-search text-[#57534E] mr-2"></i>
            <input type="text" placeholder="搜索商品" class="flex-1 bg-transparent text-[#1C1917] placeholder-[#A8A29E] outline-none">
        </div>
    </section>

    <!-- 轮播图 -->
    <section class="relative mn-hero h-64 overflow-hidden">
        <div class="flex h-full relative z-[1]">
            <img src="https://images.unsplash.com/photo-1441986300917-64674bd600d8?w=800&q=80" alt="Banner" class="w-full h-full object-cover flex-shrink-0 opacity-95">
        </div>
        <div class="absolute bottom-4 left-1/2 transform -translate-x-1/2 flex gap-2 z-[2]">
            <div class="w-2 h-2 bg-white rounded-full"></div>
            <div class="w-2 h-2 bg-white/50 rounded-full"></div>
        </div>
    </section>

    <!-- 分类入口 -->
    <section class="bg-white py-6 border-b border-[#E7E5E4]">
        <div class="flex gap-4 px-4 overflow-x-auto scrollbar-hide">
            <button type="button" class="mn-chip px-6 py-2 bg-[#C2410C] text-white text-xs font-semibold tracking-wider uppercase whitespace-nowrap flex-shrink-0 border border-[#C2410C]">外套</button>
            <button type="button" class="mn-chip mn-chip--ghost px-6 py-2 bg-white text-[#1C1917] border border-[#D6D3D1] text-xs font-semibold tracking-wider uppercase whitespace-nowrap flex-shrink-0">衬衫</button>
            <button type="button" class="mn-chip mn-chip--ghost px-6 py-2 bg-white text-[#1C1917] border border-[#D6D3D1] text-xs font-semibold tracking-wider uppercase whitespace-nowrap flex-shrink-0">配饰</button>
            <button type="button" class="mn-chip mn-chip--ghost px-6 py-2 bg-white text-[#1C1917] border border-[#D6D3D1] text-xs font-semibold tracking-wider uppercase whitespace-nowrap flex-shrink-0">下装</button>
            <button type="button" class="mn-chip mn-chip--ghost px-6 py-2 bg-white text-[#1C1917] border border-[#D6D3D1] text-xs font-semibold tracking-wider uppercase whitespace-nowrap flex-shrink-0">全部</button>
        </div>
    </section>

    <!-- 精选推荐 -->
    <section class="mt-2 px-4 pt-6 pb-28 rounded-t-[12px] bg-[#FDF6EC]/60 border-t border-[#E7E5E4]">
        <div class="flex items-end justify-between mb-4 gap-2">
            <div>
                <p class="text-[11px] font-bold text-[#57534E] uppercase tracking-[0.09em] mb-1">Curated</p>
                <h2 class="text-lg vintage-title tracking-wide">精选商品</h2>
            </div>
            <span class="text-xs text-[#57534E] font-semibold tracking-wider uppercase shrink-0 pb-0.5">更多 <i class="fas fa-chevron-right text-[10px] ml-0.5"></i></span>
        </div>
        <div class="grid grid-cols-2 gap-3.5">
            <div class="card-shadow card-shadow-hover overflow-hidden">
                <div class="relative h-56 bg-[#FDF6EC]">
                    <img src="https://images.unsplash.com/photo-1552374196-c4e7ffc6e126?w=400&q=80" alt="商品" class="w-full h-full object-cover">
                    <span class="absolute top-3 right-3 vintage-badge">限量</span>
                </div>
                <div class="p-4 bg-white">
                    <p class="text-sm vintage-card-title mb-2">90年代复古夹克</p>
                    <p class="vintage-price">¥299</p>
                </div>
            </div>
            <div class="card-shadow card-shadow-hover overflow-hidden">
                <div class="relative h-56 bg-[#FDF6EC]">
                    <img src="https://images.unsplash.com/photo-1594633312681-425c7b97ccd1?w=400&q=80" alt="商品" class="w-full h-full object-cover">
                </div>
                <div class="p-4 bg-white">
                    <p class="text-sm vintage-card-title mb-2">经典格纹衬衫</p>
                    <p class="vintage-price">¥189</p>
                </div>
            </div>
            <div class="card-shadow card-shadow-hover overflow-hidden">
                <div class="relative h-56 bg-[#FDF6EC]">
                    <img src="https://images.unsplash.com/photo-1551028719-00167b16eac5?w=400&q=80" alt="商品" class="w-full h-full object-cover">
                </div>
                <div class="p-4 bg-white">
                    <p class="text-sm vintage-card-title mb-2">复古牛仔外套</p>
                    <p class="vintage-price">¥359</p>
                </div>
            </div>
            <div class="card-shadow card-shadow-hover overflow-hidden">
                <div class="relative h-56 bg-[#FDF6EC]">
                    <img src="https://images.unsplash.com/photo-1551488831-00ddcb6c6bd3?w=400&q=80" alt="商品" class="w-full h-full object-cover">
                </div>
                <div class="p-4 bg-white">
                    <p class="text-sm vintage-card-title mb-2">vintage皮夹克</p>
                    <p class="vintage-price">¥599</p>
                </div>
            </div>
        </div>
    </section>

    <!-- 底部导航 -->
    <nav class="bottom-nav fixed bottom-0 left-0 right-0 safe-bottom">
        <div class="flex items-center justify-around py-2 px-1">
            <div class="flex flex-col items-center min-w-0 flex-1">
                <img src="../../icons/nav/market-nest/home-on.png" alt="" class="w-5 h-5 mb-0.5 object-contain" width="20" height="20" decoding="async">
                <span class="text-[10px] text-[#C2410C] font-medium tracking-wider uppercase">首页</span>
            </div>
            <div class="flex flex-col items-center min-w-0 flex-1">
                <img src="../../icons/nav/market-nest/category-off.png" alt="" class="w-5 h-5 mb-0.5 object-contain" width="20" height="20" decoding="async">
                <span class="text-[10px] text-[#57534E] tracking-wider uppercase">分类</span>
            </div>
            <div class="flex flex-col items-center min-w-0 flex-1">
                <img src="../../icons/nav/market-nest/sell-idle-off.png" alt="" class="w-5 h-5 mb-0.5 object-contain" width="20" height="20" decoding="async">
                <span class="text-[10px] text-[#57534E]">卖闲置</span>
            </div>
            <div class="flex flex-col items-center min-w-0 flex-1">
                <img src="../../icons/nav/market-nest/cart-off.png" alt="" class="w-5 h-5 mb-0.5 object-contain" width="20" height="20" decoding="async">
                <span class="text-[10px] text-[#57534E] tracking-wider uppercase">购物车</span>
            </div>
            <div class="flex flex-col items-center min-w-0 flex-1">
                <img src="../../icons/nav/market-nest/user-off.png" alt="" class="w-5 h-5 mb-0.5 object-contain" width="20" height="20" decoding="async">
                <span class="text-[10px] text-[#57534E] tracking-wider uppercase">我的</span>
            </div>
        </div>
    </nav>
</body>
</html>
