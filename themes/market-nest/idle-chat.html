<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>私聊 - 古着商城</title>
    <link rel="stylesheet" href="../../uno.css?v=__ASSET_VERSION__">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Open+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Source+Code+Pro:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css?v=__ASSET_VERSION__">
    <script src="../../scrollbar-control.js?v=__ASSET_VERSION__"></script>
    <style>
        .idle-overlay { position: fixed; inset: 0; z-index: 200; display: flex; visibility: hidden; opacity: 0; pointer-events: none; transition: opacity 0.2s ease, visibility 0.2s; }
        .idle-overlay:target { visibility: visible; opacity: 1; pointer-events: auto; }
        .idle-overlay--bottom { align-items: flex-end; justify-content: stretch; }
        .idle-backdrop { position: absolute; inset: 0; z-index: 0; background: rgba(0, 0, 0, 0.48); }
        .idle-buy-panel { position: relative; z-index: 10; width: 100%; background: #fff; border-radius: 12px 12px 0 0; border: 1px solid #D6D3D1; border-bottom: 0; box-shadow: 0 8px 24px rgba(28, 25, 23, 0.1); max-height: min(70vh, 88dvh); display: flex; flex-direction: column; min-height: 0; overflow: hidden; }
        .idle-buy-scroll { flex: 1; min-height: 0; overflow-y: auto; overscroll-behavior: contain; -webkit-overflow-scrolling: touch; }
        .idle-buy-footer { flex-shrink: 0; background: #fff; border-top: 1px solid #E7E5E4; padding: 12px 16px calc(16px + env(safe-area-inset-bottom)); }
    </style>
</head>
<body class="min-h-[100dvh] flex flex-col m-0 p-0 bg-[#F5F5F4] text-[#1C1917]">
    <header class="safe-top shrink-0 flex items-center gap-1 px-2 py-2.5 bg-[#F5F5F4] border-b border-[#E7E5E4]">
        <a href="idle-detail.html" class="w-10 h-10 flex items-center justify-center text-[#111] no-underline" aria-label="返回"><i class="fas fa-chevron-left text-lg"></i></a>
        <div class="flex-1 min-w-0 text-center px-1">
            <p class="text-[15px] font-semibold text-[#111] leading-tight truncate">区别市场通货</p>
            <p class="text-[11px] text-[#888] mt-0.5">会员名：0***4</p>
        </div>
        <span class="w-10 shrink-0"></span>
    </header>
    <div class="shrink-0 flex gap-3 px-3 py-3 bg-white border-b border-[#E7E5E4]">
        <img src="https://images.unsplash.com/photo-1556906781-9a412961c28c?w=120&q=70" alt="" class="w-[72px] h-[72px] rounded object-cover border border-[#E7E5E4] shrink-0">
        <div class="flex-1 min-w-0 flex flex-col justify-center gap-0.5">
            <p class="text-xl font-bold vintage-price leading-none">¥70</p>
            <p class="text-[11px] text-[#57534E]">含运费0.00元</p>
            <p class="text-[11px] text-[#57534E]">广东·广州</p>
        </div>
        <a href="#sheet-buy" class="shrink-0 self-center px-3 py-2 rounded-md text-xs font-semibold text-white bg-[#C2410C] no-underline whitespace-nowrap">立即购买</a>
    </div>
    <main class="flex-1 min-h-0 bg-white flex flex-col items-center justify-center px-6">
        <p class="text-sm text-[#A8A29E] text-center">暂无聊天记录<br><span class="text-xs mt-1 inline-block">说说你的想法，开启对话吧</span></p>
    </main>
    <div class="shrink-0 flex items-center gap-2.5 px-3 py-2.5 bg-[#F5F5F4] border-t border-[#E7E5E4] pb-[calc(10px+env(safe-area-inset-bottom))]">
        <input type="text" class="flex-1 min-w-0 h-10 rounded-md bg-white border border-[#E7E5E4] px-3 text-sm text-[#1C1917] outline-none" placeholder="想跟TA说点什么...">
        <button type="button" class="w-10 h-10 shrink-0 rounded-full bg-white border border-[#D6D3D1] text-[#1C1917] text-xl leading-none flex items-center justify-center">+</button>
    </div>

    <div id="sheet-buy" class="idle-overlay idle-overlay--bottom">
        <a href="#" class="idle-backdrop" aria-label="关闭"></a>
        <div class="idle-buy-panel">
            <div class="shrink-0 flex gap-3 px-4 pt-4 pb-3 border-b border-[#F5F5F4]">
                <img src="https://images.unsplash.com/photo-1556906781-9a412961c28c?w=200&q=80" alt="" class="w-[88px] h-[88px] rounded-lg object-cover border border-[#E7E5E4] shrink-0">
                <div class="flex-1 min-w-0 pt-0.5">
                    <p class="text-[22px] font-bold vintage-price leading-tight mb-1">¥59.00</p>
                    <p class="text-xs text-[#57534E] leading-snug">请选择 颜色、尺码</p>
                </div>
                <a href="#" class="w-9 h-9 shrink-0 flex items-center justify-center text-[#A8A29E] text-2xl font-light leading-none no-underline" aria-label="关闭">&times;</a>
            </div>
            <div class="idle-buy-scroll px-4 py-3 pb-2">
                <p class="text-[13px] text-[#1C1917] font-medium mb-2">颜色</p>
                <div class="flex flex-wrap gap-2 mb-5">
                    <span class="px-3.5 py-2 rounded-md bg-[#FFFBF5] border border-[#E7E5E4] text-sm text-[#1C1917]">0690蓝色</span>
                    <span class="px-3.5 py-2 rounded-md bg-[#FFFBF5] border border-[#E7E5E4] text-sm text-[#1C1917]">0690墨绿色</span>
                </div>
                <p class="text-[13px] text-[#1C1917] font-medium mb-2">尺码</p>
                <div class="flex flex-wrap gap-2 mb-5">
                    <span class="w-11 h-11 flex items-center justify-center rounded-md bg-[#FFFBF5] border border-[#E7E5E4] text-sm text-[#1C1917]">S</span>
                    <span class="w-11 h-11 flex items-center justify-center rounded-md bg-[#FFFBF5] border border-[#E7E5E4] text-sm text-[#1C1917]">M</span>
                    <span class="w-11 h-11 flex items-center justify-center rounded-md bg-[#FFFBF5] border border-[#E7E5E4] text-sm text-[#1C1917]">L</span>
                    <span class="w-11 h-11 flex items-center justify-center rounded-md bg-[#FFFBF5] border border-[#E7E5E4] text-sm text-[#1C1917]">XL</span>
                    <span class="w-11 h-11 flex items-center justify-center rounded-md bg-[#FFFBF5] border border-[#E7E5E4] text-sm text-[#1C1917]">2XL</span>
                </div>
                <div class="flex items-center justify-between py-1">
                    <span class="text-sm text-[#1C1917]">购买数量</span>
                    <div class="flex items-center rounded-full border border-[#E7E5E4] overflow-hidden bg-[#FFFBF5]">
                        <button type="button" class="w-10 h-9 text-lg text-[#57534E] border-0 bg-transparent cursor-default">−</button>
                        <span class="w-10 text-center text-sm font-medium border-x border-[#E7E5E4]">1</span>
                        <button type="button" class="w-10 h-9 text-lg text-[#57534E] border-0 bg-transparent cursor-default">+</button>
                    </div>
                </div>
            </div>
            <div class="idle-buy-footer">
                <a href="#" class="block w-full py-3.5 rounded-[4px] text-center text-[16px] font-semibold text-white bg-[#C2410C] border border-[#9A3412] no-underline">立即购买</a>
            </div>
        </div>
    </div>
</body>
</html>
