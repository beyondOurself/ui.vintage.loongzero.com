<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人信息 - 古着商城</title>
    <link rel="stylesheet" href="../../uno.css?v=__ASSET_VERSION__">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css?v=__ASSET_VERSION__">
    <script src="../../scrollbar-control.js?v=__ASSET_VERSION__"></script></head>
<body class="vintage-bg" style="margin:0;padding:0;">
    <header class="bg-white sticky top-0 z-50 safe-top border-b border-[#E8E5E0]">
        <div class="flex items-center justify-between px-4 py-4">
            <a href="profile.html" class="text-[#2D1C13] p-2 -ml-2 inline-flex no-underline active:opacity-70" aria-label="返回"><i class="fas fa-chevron-left text-lg"></i></a>
            <h1 class="text-base vintage-title">个人信息</h1>
            <span class="w-9" aria-hidden="true"></span>
        </div>
    </header>

    <main class="px-4 py-4 pb-8">
        <div class="card-shadow overflow-hidden">
            <div class="flex items-center justify-between px-4 py-4 border-b border-[#E8E5E0]">
                <span class="text-sm vintage-card-title">头像<span class="text-[#876635]">*</span></span>
                <div class="flex items-center gap-2">
                    <span class="inline-flex items-center justify-center w-10 h-10"><i class="fas fa-user text-2xl text-[#351D14]"></i></span>
                    <i class="fas fa-chevron-right text-[#857C72] text-sm"></i>
                </div>
            </div>
            <a href="#" class="flex items-center justify-between px-4 py-4 border-b border-[#E8E5E0] no-underline text-inherit active:bg-[#F5F3F0]">
                <span class="text-sm vintage-card-title">性别<span class="text-[#876635]">*</span></span>
                <span class="flex items-center gap-2 text-sm text-[#857C72]">男<i class="fas fa-chevron-right text-[#857C72] text-xs"></i></span>
            </a>
            <a href="#" class="flex items-center justify-between px-4 py-4 border-b border-[#E8E5E0] no-underline text-inherit active:bg-[#F5F3F0]">
                <span class="text-sm vintage-card-title">昵称<span class="text-[#876635]">*</span></span>
                <i class="fas fa-chevron-right text-[#857C72] text-sm"></i>
            </a>
            <div class="flex items-center justify-between px-4 py-4 border-b border-[#E8E5E0]">
                <span class="text-sm vintage-card-title inline-flex items-center gap-1">生日 <i class="fas fa-circle-question text-[#857C72] text-xs"></i></span>
                <span class="text-sm text-[#857C72]">1996-01-04</span>
            </div>
            <div class="flex items-center justify-between px-4 py-4 border-b border-[#E8E5E0]">
                <span class="text-sm vintage-card-title">手机号</span>
                <span class="text-sm text-[#857C72]">15099836861</span>
            </div>
            <a href="#" class="flex items-center justify-between px-4 py-4 border-b border-[#E8E5E0] no-underline text-inherit active:bg-[#F5F3F0]">
                <span class="text-sm vintage-card-title">尺码档案</span>
                <i class="fas fa-chevron-right text-[#857C72] text-sm"></i>
            </a>
            <a href="#" class="flex items-center justify-between px-4 py-4 no-underline text-inherit active:bg-[#F5F3F0]">
                <span class="text-sm vintage-card-title">收货地址</span>
                <i class="fas fa-chevron-right text-[#857C72] text-sm"></i>
            </a>
        </div>

        <div class="mt-6 space-y-3">
            <button type="button" class="w-full vintage-btn block text-center tracking-wider uppercase text-sm">保存</button>
            <button type="button" class="w-full vintage-btn-secondary block text-center tracking-wider uppercase text-sm">退出登录</button>
        </div>
    </main>
</body>
</html>
